# Lomi Lomi – Render Blueprint (preprod)
# Service web déployé via Docker Hub image (schillem/lomilomi-api:latest)
# DB PostgreSQL 16 – Frankfurt – basic_256mb

databases:
  - name: lomilomi-db
    plan: basic_256mb
    databaseName: lomilomi
    user: lomilomi
    region: frankfurt
    version: "16"

services:
  - type: web
    name: lomilomi-api
    runtime: image
    image:
      url: docker.io/schillem/lomilomi-api:latest
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8888"
      - key: DB_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: lomilomi-db
          property: connectionURI
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://lomilomi.netlify.app
      - key: UPLOAD_DIR
        value: ./uploads
      - key: BASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
