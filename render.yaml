databases:
  - name: lomilomi-db
    plan: free
    databaseName: lomilomi
    user: lomilomi
    region: frankfurt

services:
  - type: web
    name: lomilomi-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8888"
      - key: DB_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: lomilomi-db
          property: connectionURI
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://lomilomi.netlify.app
      - key: UPLOAD_DIR
        value: ./uploads
      - key: BASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
